<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة الاستقلال الرقمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #2563eb;
            --accent: #f59e0b;
            --success: #10b981;
            --bg: #f1f5f9;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            background: radial-gradient(circle at top right, #e2e8f0, #cbd5e1);
            margin: 0; padding: 20px; min-height: 100vh;
            display: flex; justify-content: center;
        }

        .main-wrapper { width: 100%; max-width: 700px; }

        /* الكارت الرئيسي */
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 40px 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }

        .school-logo {
            width: 90px; height: 90px; background: white;
            border-radius: 25px; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            cursor: pointer; position: relative;
        }
        .school-logo i { font-size: 45px; color: var(--secondary); }

        h1 { font-weight: 900; color: var(--primary); margin: 0; font-size: 28px; letter-spacing: -0.5px; }
        .tagline { color: #64748b; font-size: 14px; margin-top: 5px; margin-bottom: 35px; }

        /* منطقة الإدخال */
        .search-box { position: relative; margin-bottom: 25px; }
        .search-box input {
            width: 100%; padding: 18px 55px 18px 20px;
            border-radius: 18px; border: 2px solid #e2e8f0;
            font-size: 16px; font-weight: 600; outline: none; background: #fff;
        }
        .search-box input:focus { border-color: var(--secondary); box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.1); }
        .search-box i { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--secondary); font-size: 20px; }

        .btn-main {
            width: 100%; padding: 18px; border: none; border-radius: 18px;
            background: var(--secondary); color: white; font-weight: 800; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); }

        /* عرض النتائج */
        #resultArea { display: none; margin-top: 35px; animation: fadeIn 0.6s ease; }
        .student-header { 
            background: var(--primary); color: white; padding: 15px; 
            border-radius: 15px; margin-bottom: 15px; font-weight: 700;
        }

        .data-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .data-table th { color: #64748b; font-size: 13px; padding: 10px; text-align: center; }
        .data-table td { 
            background: white; padding: 15px 10px; text-align: center;
            border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9;
        }
        .data-table td:first-child { border-right: 1px solid #f1f5f9; border-radius: 0 12px 12px 0; text-align: right; color: var(--primary); font-weight: 700; }
        .data-table td:last-child { border-left: 1px solid #f1f5f9; border-radius: 12px 0 0 12px; }

        .badge { padding: 4px 10px; border-radius: 8px; font-weight: 700; font-size: 14px; }
        .badge-work { background: #eff6ff; color: #2563eb; }
        .badge-exam { background: #fef2f2; color: #dc2626; }
        .badge-total { background: #fffbeb; color: #d97706; border: 1px solid #fef3c7; }

        /* لوحة التحكم */
        #adminPanel { display: none; margin-top: 20px; text-align: right; }
        .admin-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="glass-panel" id="searchPanel">
        <div class="school-logo" ondblclick="openAdmin()">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <h1>مدرسة الاستقلال</h1>
        <p class="tagline">بوابة النتائج الإلكترونية - العام الدراسي 2026</p>

        <div class="search-box">
            <i class="fas fa-fingerprint"></i>
            <input type="number" id="searchID" placeholder="أدخل الرقم الوطني للطالب...">
        </div>
        
        <button class="btn-main" onclick="searchStudent()">
            <span>استخراج النتيجة</span>
            <i class="fas fa-arrow-left"></i>
        </button>

        <div id="resultArea">
            <div class="student-header" id="resName"></div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>المادة</th>
                        <th>أعمال السنة</th>
                        <th>الامتحان</th>
                        <th>المجموع</th>
                    </tr>
                </thead>
                <tbody id="resGrades"></tbody>
            </table>
        </div>
    </div>

    <div id="adminPanel" class="glass-panel">
        <h2 style="margin-top:0; color:var(--primary)">لوحة التحكم المركزية</h2>
        <input type="number" id="stdID" placeholder="الرقم الوطني" style="margin-bottom:10px; width:100%; padding:12px; border-radius:10px; border:1px solid #ddd">
        <input type="text" id="stdName" placeholder="اسم الطالب الكامل" style="margin-bottom:20px; width:100%; padding:12px; border-radius:10px; border:1px solid #ddd">
        
        <div id="gradesInputs">
            <div class="admin-row">
                <input type="text" placeholder="المادة" class="subject" style="padding:10px; border-radius:8px; border:1px solid #ddd">
                <input type="number" placeholder="أعمال" class="work" style="padding:10px; border-radius:8px; border:1px solid #ddd">
                <input type="number" placeholder="امتحان" class="exam" style="padding:10px; border-radius:8px; border:1px solid #ddd">
            </div>
        </div>
        
        <button onclick="addRow()" style="width:100%; background:#f1f5f9; color:#475569; padding:10px; margin:10px 0; border:none; border-radius:10px; cursor:pointer; font-weight:700">+ إضافة مادة أخرى</button>
        <button onclick="saveData()" style="width:100%; background:var(--success); color:white; padding:15px; border:none; border-radius:12px; cursor:pointer; font-weight:800; font-size:16px">حفظ في قاعدة البيانات</button>
        <button onclick="closeAdmin()" style="width:100%; background:#94a3b8; color:white; padding:10px; border:none; border-radius:12px; cursor:pointer; margin-top:10px">رجوع</button>
    </div>
</div>

<script>
    // --- إعدادات Firebase الخاصة بك ---
    const firebaseConfig = {
      apiKey: "AIzaSyC...", // ضع مفتاحك هنا
      databaseURL: "https://istiqlal-school-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school",
      appId: "..."
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // دالة البحث الاحترافية
    function searchStudent() {
        const id = document.getElementById('searchID').value;
        if(!id) return alert("يرجى كتابة الرقم الوطني");

        db.ref('students/' + id).once('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('resName').innerHTML = `<i class="fas fa-user-graduate" style="margin-left:10px"></i> الطالب: ${data.name}`;
                let rows = "";
                data.grades.forEach(g => {
                    const total = parseInt(g.work || 0) + parseInt(g.exam || 0);
                    rows += `<tr>
                        <td>${g.subject}</td>
                        <td><span class="badge badge-work">${g.work}</span></td>
                        <td><span class="badge badge-badge-exam">${g.exam}</span></td>
                        <td><span class="badge badge-total">${total}</span></td>
                    </tr>`;
                });
                document.getElementById('resGrades').innerHTML = rows;
                document.getElementById('resultArea').style.display = "block";
            } else {
                alert("الرقم الوطني غير مسجل في النظام");
            }
        });
    }

    // وظائف الإدارة المخفية
    function openAdmin() {
        if(prompt("كلمة سر النظام:") === "74742000") {
            document.getElementById('adminPanel').style.display = "block";
            document.getElementById('searchPanel').style.display = "none";
        }
    }

    function closeAdmin() {
        document.getElementById('adminPanel').style.display = "none";
        document.getElementById('searchPanel').style.display = "block";
    }

    function addRow() {
        const div = document.createElement('div');
        div.className = "admin-row";
        div.innerHTML = `<input type="text" placeholder="المادة" class="subject" style="padding:10px; border-radius:8px; border:1px solid #ddd">
                         <input type="number" placeholder="أعمال" class="work" style="padding:10px; border-radius:8px; border:1px solid #ddd">
                         <input type="number" placeholder="امتحان" class="exam" style="padding:10px; border-radius:8px; border:1px solid #ddd">`;
        document.getElementById('gradesInputs').appendChild(div);
    }

    function saveData() {
        const id = document.getElementById('stdID').value;
        const name = document.getElementById('stdName').value;
        const subs = document.querySelectorAll('.subject');
        const works = document.querySelectorAll('.work');
        const exams = document.querySelectorAll('.exam');
        
        let grades = [];
        subs.forEach((s, i) => {
            if(s.value) grades.push({ subject: s.value, work: works[i].value, exam: exams[i].value });
        });

        if(!id || !name || grades.length === 0) return alert("الرجاء ملء كافة الحقول");

        db.ref('students/' + id).set({ name, grades }, () => {
            alert("✅ تم رفع البيانات بنجاح");
            location.reload();
        });
    }
</script>

</body>
</html>
