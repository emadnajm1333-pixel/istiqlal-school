<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة مدرسة الاستقلال</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 25px; border-radius: 20px; max-width: 400px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; font-weight: bold; }
        button { width: 95%; padding: 15px; border-radius: 12px; border: none; background: #3b82f6; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        #adminSection { display: none; margin-top: 20px; border-top: 1px solid #334155; padding-top: 20px; }
        .success { color: #10b981; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 onclick="openAdmin()" style="cursor:pointer;">مدرسة الاستقلال 🏫</h2>
    <p>بوابة الاستعلام عن النتائج</p>
    
    <input type="number" id="searchID" placeholder="أدخل الرقم الوطني">
    <button onclick="doSearch()">عرض النتيجة</button>
    <div id="res"></div>

    <div id="adminSection">
        <h3 style="color:#10b981;">لوحة الإدارة</h3>
        <input type="number" id="newID" placeholder="رقم وطني جديد">
        <input type="text" id="newName" placeholder="اسم الطالب">
        <input type="number" id="newGrade" placeholder="الدرجة">
        <button style="background:#10b981;" id="saveBtn" onclick="doSave()">حفظ في السحابة</button>
        <p id="status"></p>
    </div>
</div>

<script>
    // بياناتك اللي في السحابة
    const firebaseConfig = {
      apiKey: "AIzaSyByP1o-D0-...", 
      databaseURL: "https://istiqlal-school-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school",
      appId: "1:708785664183:web:7586a7d1894a8677764654"
    };

    // تشغيل النظام
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const database = firebase.database();

    // دالة البحث
    function doSearch() {
        const id = document.getElementById('searchID').value;
        if(!id) return alert("اكتب الرقم الوطني!");
        
        database.ref('students/' + id).once('value').then((snap) => {
            const data = snap.val();
            if(data) {
                document.getElementById('res').innerHTML = `<div class="success">الاسم: ${data.name} <br> الدرجة: ${data.grade || 'لا يوجد'}</div>`;
            } else {
                alert("الرقم غير موجود");
            }
        }).catch(e => alert("خطأ اتصال: " + e.message));
    }

    function openAdmin() {
        if(prompt("رمز الدخول:") === "7474") {
            document.getElementById('adminSection').style.display = "block";
        }
    }

    // دالة الحفظ (اللي كانت خربانة)
    function doSave() {
        const id = document.getElementById('newID').value;
        const name = document.getElementById('newName').value;
        const grade = document.getElementById('newGrade').value;
        const btn = document.getElementById('saveBtn');

        if(!id || !name) return alert("أكمل البيانات");

        btn.innerText = "جاري الحفظ...";
        btn.disabled = true;

        database.ref('students/' + id).set({
            name: name,
            grade: grade
        }).then(() => {
            alert("تم الحفظ بنجاح ✅");
            btn.innerText = "حفظ في السحابة";
            btn.disabled = false;
            document.getElementById('status').innerText = "آخر عملية: تم حفظ " + name;
        }).catch((err) => {
            alert("فشل: " + err.message);
            btn.disabled = false;
            btn.innerText = "حفظ في السحابة";
        });
    }
</script>
</body>
</html>
