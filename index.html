<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الاستقلال | النتائج الإلكترونية</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #0f172a; --gold: #c5a059; --bg: #f1f5f9; }
        body { margin: 0; background: var(--bg); font-family: 'Cairo', sans-serif; }
        .portal-header { background: linear-gradient(135deg, var(--dark) 0%, #1e293b 100%); padding: 40px 15px; text-align: center; border-bottom: 5px solid var(--gold); color: white; }
        .portal-header h1 { font-family: 'Amiri', serif; font-size: 2.5rem; margin: 0; color: #fcf6ba; }
        .container { width: 92%; max-width: 600px; margin: 20px auto; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .input-field { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1.1rem; text-align: center; font-family: 'Cairo'; box-sizing: border-box; margin-bottom: 15px; }
        .btn-main { background: var(--dark); color: var(--gold); width: 100%; padding: 15px; border: 1px solid var(--gold); border-radius: 12px; font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { opacity: 0.9; transform: translateY(-2px); }
        #resultView, #adminView { display: none; }
        .res-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .res-table th { background: #f8fafc; color: #64748b; padding: 10px; font-size: 0.9rem; }
        .res-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: center; font-weight: 700; color: var(--dark); }
        .subject-block { background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div class="portal-header">
    <h1>مدرسة الاستقلال</h1>
    <p>بوابة النتائج الرسمية</p>
</div>

<div class="container">
    <div id="searchView" class="card">
        <h2 style="text-align: center;">الاستعلام عن النتيجة</h2>
        <input type="number" id="stuID" class="input-field" placeholder="أدخل الرقم الوطني">
        <button class="btn-main" onclick="getStudent()">عرض النتيجة</button>
        <p onclick="showAdmin()" style="text-align:center; color:#cbd5e1; font-size:11px; margin-top:30px; cursor:pointer;">لوحة التحكم</p>
    </div>

    <div id="resultView" class="card">
        <h3 id="outName" style="text-align:center; color:var(--dark);"></h3>
        <table class="res-table">
            <thead><tr><th>المادة</th><th>أعمال</th><th>امتحان</th><th>المجموع</th></tr></thead>
            <tbody id="outBody"></tbody>
        </table>
        <button class="btn-main" style="margin-top:20px;" onclick="location.reload()">استعلام آخر</button>
    </div>

    <div id="adminView" class="card">
        <h3>إضافة بيانات طالب</h3>
        <input type="number" id="admI" class="input-field" placeholder="الرقم الوطني">
        <input type="text" id="admN" class="input-field" placeholder="اسم الطالب بالكامل">
        <div id="subList">
            <div class="subject-block">
                <input type="text" class="sn input-field" style="padding:10px; font-size:0.9rem;" placeholder="اسم المادة">
                <div style="display:flex; gap:10px;">
                    <input type="number" class="sw input-field" style="padding:10px;" placeholder="أعمال">
                    <input type="number" class="sf input-field" style="padding:10px;" placeholder="امتحان">
                </div>
            </div>
        </div>
        <button onclick="addRow()" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px dashed var(--dark); cursor:pointer;">+ إضافة مادة</button>
        <button class="btn-main" onclick="saveData()">حفظ في السحابة</button>
    </div>
</div>

<script>
    // الإعدادات التي استخرجتها أنت من Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyACeLmH3dXHJq2yq9cKpUbO-95EJImJw_A",
      authDomain: "istiqlal-school-dafb4.firebaseapp.com",
      databaseURL: "https://istiqlal-school-dafb4-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school-dafb4",
      storageBucket: "istiqlal-school-dafb4.firebasestorage.app",
      messagingSenderId: "584409923659",
      appId: "1:584409923659:web:6da8ccacd6e1187e458dce"
    };

    // تشغيل فيربيس
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function getStudent() {
        let id = document.getElementById('stuID').value;
        if(!id) return alert("يرجى إدخال الرقم الوطني");
        
        database.ref('students/' + id).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                let s = snapshot.val();
                document.getElementById('searchView').style.display = 'none';
                document.getElementById('resultView').style.display = 'block';
                document.getElementById('outName').innerText = "الطالب: " + s.name;
                let h = "";
                s.subs.forEach(x => {
                    let total = parseFloat(x.w || 0) + parseFloat(x.f || 0);
                    h += `<tr><td>${x.n}</td><td>${x.w}</td><td>${x.f}</td><td>${total}</td></tr>`;
                });
                document.getElementById('outBody').innerHTML = h;
            } else { alert("عذراً، هذا الرقم غير مسجل بالمنظومة"); }
        });
    }

    function showAdmin() {
        if(prompt("كلمة مرور الإدارة:") === "74742000") {
            document.getElementById('searchView').style.display = 'none';
            document.getElementById('adminView').style.display = 'block';
        }
    }

    function addRow() {
        let div = document.createElement('div'); div.className = 'subject-block';
        div.innerHTML = `<input type="text" class="sn input-field" style="padding:10px; font-size:0.9rem;" placeholder="اسم المادة">
                <div style="display:flex; gap:10px;"><input type="number" class="sw input-field" style="padding:10px;" placeholder="أعمال">
                <input type="number" class="sf input-field" style="padding:10px;" placeholder="امتحان"></div>`;
        document.getElementById('subList').appendChild(div);
    }

    function saveData() {
        let id = document.getElementById('admI').value;
        let name = document.getElementById('admN').value;
        let sns = document.getElementsByClassName('sn'), sws = document.getElementsByClassName('sw'), sfs = document.getElementsByClassName('sf');
        
        let subs = [];
        for(let i=0; i<sns.length; i++) {
            if(sns[i].value) subs.push({n: sns[i].value, w: sws[i].value, f: sfs[i].value});
        }
        
        if(!id || !name || subs.length === 0) return alert("يرجى إكمال جميع البيانات");

        database.ref('students/' + id).set({name, subs}, (error) => {
            if (error) { alert("حدث خطأ في الحفظ"); } 
            else { alert("تم حفظ بيانات الطالب بنجاح!"); location.reload(); }
        });
    }
</script>
</body>
</html>
