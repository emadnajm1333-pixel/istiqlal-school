<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منظومة مدرسة الاستقلال</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; max-width: 400px; margin: auto; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; }
        button { width: 95%; padding: 15px; border-radius: 12px; border: none; background: #3b82f6; color: white; cursor: pointer; font-weight: bold; }
        #adminPanel { display: none; margin-top: 20px; border-top: 2px solid #334155; padding-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="mainTitle" ondblclick="openAdmin()" style="cursor:pointer;">مدرسة الاستقلال</h2>
    <p>اضغط مرتين على العنوان لفتح الإدارة</p>
    
    <input type="number" id="sID" placeholder="الرقم الوطني">
    <button onclick="search()">عرض النتيجة</button>
    <div id="res" style="margin-top:20px; font-weight:bold; color:#10b981;"></div>

    <div id="adminPanel">
        <h3 style="color:#10b981;">لوحة الإدارة الخاصة</h3>
        <input type="number" id="aID" placeholder="رقم الطالب الجديد">
        <input type="text" id="aName" placeholder="اسم الطالب">
        <input type="number" id="aGrade" placeholder="الدرجة">
        <button id="saveBtn" style="background:#10b981;" onclick="save()">حفظ الطالب الآن</button>
    </div>
</div>

<script>
    // بياناتك البرمجية
    const config = {
      apiKey: "AIzaSyByP1o-D0-...", 
      databaseURL: "https://istiqlal-school-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school",
      appId: "1:708785664183:web:7586a7d1894a8677764654"
    };

    if (!firebase.apps.length) { firebase.initializeApp(config); }
    const db = firebase.database();

    // دالة البحث
    function search() {
        const id = document.getElementById('sID').value;
        db.ref('students/' + id).once('value', (s) => {
            const d = s.val();
            if(d) {
                document.getElementById('res').innerText = "الاسم: " + d.name + " | الدرجة: " + (d.grade || "0");
            } else { alert("الرقم غير موجود"); }
        }).catch(e => alert("فشل الاتصال"));
    }

    // دالة فتح البوابة (اللي كانت خربانة)
    function openAdmin() {
        let pass = prompt("أدخل رمز الدخول الخاص بك:");
        if(pass === "7474") {
            document.getElementById('adminPanel').style.display = "block";
            alert("تم فتح البوابة الخاصة بنجاح ✅");
        } else {
            alert("الرمز خطأ");
        }
    }

    // دالة الحفظ
    function save() {
        const id = document.getElementById('aID').value;
        const name = document.getElementById('aName').value;
        const grade = document.getElementById('aGrade').value;
        
        if(!id || !name) return alert("يرجى إكمال البيانات");

        document.getElementById('saveBtn').innerText = "جاري الحفظ...";

        db.ref('students/' + id).set({ name: name, grade: grade })
        .then(() => {
            alert("تم الحفظ في السحابة بنجاح ✅");
            document.getElementById('saveBtn').innerText = "حفظ الطالب الآن";
            document.getElementById('aID').value = "";
            document.getElementById('aName').value = "";
        })
        .catch(e => {
            alert("خطأ: " + e.message);
            document.getElementById('saveBtn').innerText = "حفظ الطالب الآن";
        });
    }
</script>
</body>
</html>
