<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منظومة مدرسة الاستقلال</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; max-width: 450px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; font-size: 16px; }
        button { width: 95%; padding: 15px; border-radius: 12px; border: none; background: #3b82f6; color: white; cursor: pointer; font-weight: bold; font-size: 16px; }
        #adminPanel { display: none; margin-top: 20px; border-top: 2px solid #334155; padding-top: 20px; }
        .logo { font-size: 50px; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo" ondblclick="openAdmin()">🎓</div>
    <h1 onclick="openAdmin()">مدرسة الاستقلال</h1>
    <p>بوابة النتائج الرسمية</p>
    
    <input type="number" id="sID" placeholder="أدخل الرقم الوطني">
    <button onclick="search()">عرض النتيجة</button>
    <div id="res" style="margin-top:20px; font-weight:bold; color:#10b981;"></div>

    <div id="adminPanel">
        <h3 style="color:#10b981;">لوحة الإدارة الخاصة</h3>
        <input type="number" id="aID" placeholder="الرقم الوطني الجديد">
        <input type="text" id="aName" placeholder="اسم الطالب">
        <input type="number" id="aGrade" placeholder="الدرجة">
        <button id="saveBtn" style="background:#10b981;" onclick="save()">حفظ الطالب الآن</button>
    </div>
</div>

<script>
    const config = {
      apiKey: "AIzaSyByP1o-D0-...", 
      databaseURL: "https://istiqlal-school-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school",
      appId: "1:708785664183:web:7586a7d1894a8677764654"
    };

    if (!firebase.apps.length) { firebase.initializeApp(config); }
    const db = firebase.database();

    function search() {
        const id = document.getElementById('sID').value;
        db.ref('students/' + id).once('value', (s) => {
            const d = s.val();
            if(d) document.getElementById('res').innerText = "الطالب: " + d.name + " | الدرجة: " + (d.grade || "0");
            else alert("غير موجود");
        });
    }

    function openAdmin() {
        if(prompt("رمز الدخول:") === "7474") {
            document.getElementById('adminPanel').style.display = "block";
        }
    }

    function save() {
        const id = document.getElementById('aID').value;
        const name = document.getElementById('aName').value;
        const grade = document.getElementById('aGrade').value;
        if(!id || !name) return alert("أكمل البيانات");

        db.ref('students/' + id).set({ name: name, grade: grade })
        .then(() => { alert("تم الحفظ بنجاح ✅"); })
        .catch(e => { alert("خطأ: " + e.message); });
    }
</script>
</body>
</html>
