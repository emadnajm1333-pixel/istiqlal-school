<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة مدرسة الاستقلال المطورة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #1e3a8a; --accent: #d4af37; --bg: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: 0.3s; }
        body { background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 650px; margin: 0 auto; }
        .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 24px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid #fff; margin-bottom: 20px; text-align: center; }
        .logo-area i { font-size: 60px; color: var(--primary); cursor: pointer; margin-bottom: 15px; }
        h1 { color: var(--primary); margin: 5px 0; font-size: 26px; }
        .input-group { position: relative; margin-bottom: 20px; }
        input { width: 100%; padding: 14px 45px 14px 15px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        .input-group i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: 700; font-size: 17px; cursor: pointer; }
        
        /* جدول النتائج */
        .result-table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: right; }
        .result-table th { background: #f1f5f9; color: var(--primary); padding: 10px; border-radius: 8px; }
        .result-table td { padding: 10px; border-bottom: 1px solid #eee; font-weight: 600; }
        .total-badge { background: var(--primary); color: white; padding: 3px 8px; border-radius: 6px; }

        /* لوحة التحكم المتقدمة */
        #adminPanel { display: none; background: #fff; border-top: 6px solid var(--accent); }
        .row-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card" id="searchPanel">
        <div class="logo-area" ondblclick="openAdmin()">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <h1>مدرسة الاستقلال</h1>
        <p style="color:#64748b">استعلام نتائج الفصل الدراسي</p>
        
        <div class="input-group">
            <i class="fas fa-id-card"></i>
            <input type="number" id="searchID" placeholder="أدخل الرقم الوطني للطالب...">
        </div>
        <button onclick="searchStudent()"><i class="fas fa-search"></i> عرض النتيجة</button>

        <div id="resultArea" style="display:none; margin-top:25px; text-align: right;">
            <h3 id="resName" style="color:var(--primary); padding-bottom:10px; border-bottom: 2px solid var(--accent);"></h3>
            <table class="result-table">
                <thead>
                    <tr>
                        <th>المادة</th>
                        <th>أعمال</th>
                        <th>امتحان</th>
                        <th>المجموع</th>
                    </tr>
                </thead>
                <tbody id="resGrades"></tbody>
            </table>
        </div>
    </div>

    <div id="adminPanel" class="glass-card">
        <div class="admin-header">
            <h2 style="color: var(--primary); margin:0">لوحة الإدارة</h2>
            <button onclick="closeAdmin()" style="width:auto; padding:5px 15px; background:#ef4444">إغلاق</button>
        </div>
        <input type="number" id="stdID" placeholder="الرقم الوطني" style="margin-bottom:10px">
        <input type="text" id="stdName" placeholder="اسم الطالب بالكامل" style="margin-bottom:15px">
        
        <div id="gradesInputs">
            <div class="row-grid">
                <input type="text" placeholder="المادة" class="subject">
                <input type="number" placeholder="أعمال" class="work">
                <input type="number" placeholder="امتحان" class="exam">
            </div>
        </div>
        
        <button onclick="addRow()" style="background:#64748b; margin-top:10px; font-size:14px"><i class="fas fa-plus"></i> إضافة مادة</button>
        <button onclick="saveData()" style="background: #10b981; margin-top:10px"><i class="fas fa-save"></i> حفظ البيانات</button>
    </div>
</div>

<script>
    // ضع بيانات Firebase الخاصة بك هنا
    const firebaseConfig = {
      apiKey: "AIzaSyC...", 
      databaseURL: "https://istiqlal-school-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school",
      appId: "..."
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function searchStudent() {
        const id = document.getElementById('searchID').value;
        db.ref('students/' + id).once('value', (s) => {
            const data = s.val();
            if(data) {
                document.getElementById('resName').innerText = "الطالب: " + data.name;
                let html = "";
                data.grades.forEach(g => {
                    const total = parseInt(g.work || 0) + parseInt(g.exam || 0);
                    html += `<tr>
                        <td>${g.subject}</td>
                        <td>${g.work}</td>
                        <td>${g.exam}</td>
                        <td><span class="total-badge">${total}</span></td>
                    </tr>`;
                });
                document.getElementById('resGrades').innerHTML = html;
                document.getElementById('resultArea').style.display = "block";
            } else { alert("الرقم غير مسجل"); }
        });
    }

    function openAdmin() {
        if(prompt("كلمة السر الخاصة بالإدارة:") === "74742000") {
            document.getElementById('adminPanel').style.display = "block";
            document.getElementById('searchPanel').style.display = "none";
        }
    }

    function closeAdmin() {
        document.getElementById('adminPanel').style.display = "none";
        document.getElementById('searchPanel').style.display = "block";
    }

    function addRow() {
        const div = document.createElement('div');
        div.className = "row-grid";
        div.innerHTML = `<input type="text" placeholder="المادة" class="subject">
                         <input type="number" placeholder="أعمال" class="work">
                         <input type="number" placeholder="امتحان" class="exam">`;
        document.getElementById('gradesInputs').appendChild(div);
    }

    function saveData() {
        const id = document.getElementById('stdID').value;
        const name = document.getElementById('stdName').value;
        const subjects = document.querySelectorAll('.subject');
        const works = document.querySelectorAll('.work');
        const exams = document.querySelectorAll('.exam');
        
        let grades = [];
        subjects.forEach((s, i) => {
            if(s.value) grades.push({ subject: s.value, work: works[i].value, exam: exams[i].value });
        });

        db.ref('students/' + id).set({ name, grades }, () => {
            alert("تم الحفظ بنجاح");
            location.reload();
        });
    }
</script>
</body>
</html>
