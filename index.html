<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة مدرسة الاستقلال</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --main: #1e293b; --accent: #2563eb; --gold: #b45309; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; padding: 10px; background: #f1f5f9; min-height: 100vh; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; }
        
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        
        .logo-btn { width: 70px; height: 70px; background: #fff; border-radius: 15px; margin: 0 auto 15px; 
                    display: flex; align-items: center; justify-content: center; border: 2px solid var(--accent); cursor: pointer; }
        .logo-btn i { font-size: 35px; color: var(--accent); }

        h1 { font-size: 22px; color: var(--main); margin: 0; }
        .search-box { position: relative; margin: 20px 0; }
        input { width: 100%; padding: 12px 40px 12px 10px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 15px; outline: none; font-weight: 700; }
        .search-box i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--accent); }
        
        .btn-search { width: 100%; padding: 12px; border: none; border-radius: 12px; background: var(--accent); color: white; font-weight: 800; cursor: pointer; }

        /* جدول النتائج "تحت بعض" */
        #resultArea { display: none; margin-top: 20px; text-align: right; }
        .student-title { background: var(--main); color: white; padding: 8px 15px; border-radius: 10px; font-size: 14px; margin-bottom: 15px; }
        
        .res-table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; }
        .res-table th { background: #f8fafc; padding: 8px 5px; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        .res-table td { padding: 10px 5px; border-bottom: 1px solid #f1f5f9; text-align: center; font-weight: 700; }
        .res-table td:first-child { text-align: right; color: var(--main); }
        
        .total-box { background: #fef3c7; color: var(--gold); padding: 2px 6px; border-radius: 5px; font-weight: 900; }

        /* الإدارة */
        #adminPanel { display: none; text-align: right; }
        .admin-field { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #ddd; }
        .grid-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 5px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card" id="searchPanel">
        <div class="logo-btn" ondblclick="openAdmin()">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <h1>مدرسة الاستقلال</h1>
        
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="number" id="searchID" placeholder="أدخل الرقم الوطني...">
        </div>
        <button class="btn-search" onclick="searchStudent()">بحث عن النتيجة</button>

        <div id="resultArea">
            <div class="student-title" id="resName"></div>
            <table class="res-table">
                <thead>
                    <tr>
                        <th style="text-align: right;">المادة</th>
                        <th>أعمال</th>
                        <th>إمتحان</th>
                        <th>مجموع</th>
                    </tr>
                </thead>
                <tbody id="resGrades"></tbody>
            </table>
        </div>
    </div>

    <div id="adminPanel" class="card">
        <h3 style="margin-top:0">لوحة الإدارة</h3>
        <input type="number" id="stdID" class="admin-field" placeholder="الرقم الوطني">
        <input type="text" id="stdName" class="admin-field" placeholder="اسم الطالب">
        <div id="gradesInputs">
            <div class="grid-3">
                <input type="text" placeholder="المادة" class="subject admin-field">
                <input type="number" placeholder="أعمال" class="work admin-field">
                <input type="number" placeholder="إمتحان" class="exam admin-field">
            </div>
        </div>
        <button onclick="addRow()" style="width:100%; padding:8px; margin-bottom:10px; border:none; background:#e2e8f0; border-radius:8px">+ مادة</button>
        <button onclick="saveData()" style="width:100%; padding:12px; background:#10b981; color:white; border:none; border-radius:10px; font-weight:800">حفظ في السحابة</button>
        <button onclick="closeAdmin()" style="margin-top:10px; background:none; border:none; color:gray; text-decoration:underline; cursor:pointer">إغلاق</button>
    </div>
</div>

<script>
    // --- بيانات Firebase (تأكد من وضع بياناتك هنا) ---
    const firebaseConfig = {
      apiKey: "AIzaSyC...", 
      databaseURL: "https://istiqlal-school-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school",
      appId: "..."
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function searchStudent() {
        const id = document.getElementById('searchID').value;
        if(!id) return;
        db.ref('students/' + id).once('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('resName').innerText = "الطالب: " + data.name;
                let rows = "";
                data.grades.forEach(g => {
                    const total = parseInt(g.work || 0) + parseInt(g.exam || 0);
                    rows += `<tr>
                        <td>${g.subject}</td>
                        <td>${g.work}</td>
                        <td>${g.exam}</td>
                        <td><span class="total-box">${total}</span></td>
                    </tr>`;
                });
                document.getElementById('resGrades').innerHTML = rows;
                document.getElementById('resultArea').style.display = "block";
            } else { alert("الرقم غير موجود"); }
        });
    }

    function openAdmin() {
        if(prompt("كلمة سر الإدارة:") === "74742000") {
            document.getElementById('adminPanel').style.display = "block";
            document.getElementById('searchPanel').style.display = "none";
        }
    }

    function closeAdmin() {
        document.getElementById('adminPanel').style.display = "none";
        document.getElementById('searchPanel').style.display = "block";
    }

    function addRow() {
        const div = document.createElement('div');
        div.className = "grid-3";
        div.innerHTML = `<input type="text" placeholder="المادة" class="subject admin-field">
                         <input type="number" placeholder="أعمال" class="work admin-field">
                         <input type="number" placeholder="إمتحان" class="exam admin-field">`;
        document.getElementById('gradesInputs').appendChild(div);
    }

    function saveData() {
        const id = document.getElementById('stdID').value;
        const name = document.getElementById('stdName').value;
        const subs = document.querySelectorAll('.subject');
        const works = document.querySelectorAll('.work');
        const exams = document.querySelectorAll('.exam');
        let grades = [];
        subs.forEach((s, i) => {
            if(s.value) grades.push({ subject: s.value, work: works[i].value, exam: exams[i].value });
        });
        db.ref('students/' + id).set({ name, grades }, () => {
            alert("تم الحفظ بنجاح ✅");
            location.reload();
        });
    }
</script>
</body>
</html>
