<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منظومة مدرسة الاستقلال</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #121212; color: white; text-align: center; padding: 50px; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 20px; display: inline-block; border: 1px solid #333; }
        input { display: block; width: 250px; padding: 12px; margin: 10px auto; border-radius: 8px; border: none; }
        button { padding: 12px 30px; border-radius: 8px; border: none; background: #3b82f6; color: white; cursor: pointer; font-weight: bold; }
        #admin { display: none; margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
    </style>
</head>
<body>

<div class="box">
    <h2 onclick="openLogin()">مدرسة الاستقلال</h2>
    <p>أدخل الرقم الوطني للتجربة</p>
    <input type="number" id="sID" placeholder="رقم الطالب">
    <button onclick="check()">عرض النتيجة</button>
    <div id="out" style="margin-top:20px; color: #10b981;"></div>

    <div id="admin">
        <h3>إضافة بيانات جديدة</h3>
        <input type="number" id="nID" placeholder="رقم وطني جديد">
        <input type="text" id="nName" placeholder="الاسم بالكامل">
        <button style="background: #10b981;" onclick="add()">حفظ في السحابة</button>
    </div>
</div>

<script>
    // بياناتك البرمجية - يرجى التأكد من الـ apiKey الخاص بمشروعك
    const firebaseConfig = {
      apiKey: "AIzaSyByP1o-D0-...", 
      databaseURL: "https://istiqlal-school-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school",
      appId: "1:708785664183:web:7586a7d1894a8677764654"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function check() {
        const id = document.getElementById('sID').value;
        db.ref('students/' + id).once('value').then((s) => {
            const d = s.val();
            if(d) { document.getElementById('out').innerText = "تم العثور على: " + d.name; }
            else { alert("لا توجد بيانات لهذا الرقم"); }
        });
    }

    function openLogin() {
        if(prompt("كلمة السر") === "7474") {
            document.getElementById('admin').style.display = "block";
        }
    }

    function add() {
        const id = document.getElementById('nID').value;
        const name = document.getElementById('nName').value;
        if(!id || !name) return alert("يرجى ملء الخانات");

        db.ref('students/' + id).set({ name: name })
        .then(() => { alert("تم الحفظ بنجاح! السحابة تعمل ✅"); })
        .catch(e => { alert("خطأ في الربط: " + e.message); });
    }
</script>
</body>
</html>
