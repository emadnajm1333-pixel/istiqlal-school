<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة نتائج مدرسة الاستقلال</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #1e3a8a;
            --accent: #d4af37;
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text: #1e293b;
        }

        * {
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            margin: 0;
            padding: 20px;
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* تصميم الكارت الزجاجي */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
            text-align: center;
        }

        .logo-area i {
            font-size: 50px;
            color: var(--primary);
            margin-bottom: 10px;
        }

        h1 { font-weight: 700; color: var(--primary); margin: 10px 0; font-size: 24px; }
        p.subtitle { color: #64748b; margin-bottom: 25px; }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px 45px 15px 15px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            font-size: 16px;
            outline: none;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1); }

        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:active { transform: scale(0.98); }
        button:hover { background: #172554; }

        /* منطقة النتائج */
        #resultArea {
            margin-top: 20px;
            display: none;
            animation: slideUp 0.5s ease;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed #cbd5e1;
        }

        .grade-badge {
            background: var(--primary);
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: bold;
        }

        /* لوحة التحكم */
        #adminPanel {
            display: none;
            margin-top: 30px;
            background: #fff;
            padding: 25px;
            border-radius: 20px;
            border-top: 5px solid var(--accent);
        }

        .admin-link {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            color: #94a3b8;
            cursor: pointer;
            text-decoration: underline;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تنبيهات النجاح */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card" id="searchPanel">
        <div class="logo-area">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <h1>مدرسة الاستقلال</h1>
        <p class="subtitle">منظومة الاستعلام عن النتائج الإلكترونية</p>
        
        <div class="input-group">
            <i class="fas fa-id-card"></i>
            <input type="number" id="searchID" placeholder="أدخل الرقم الوطني للطالب...">
        </div>
        
        <button onclick="searchStudent()">
            <i class="fas fa-search"></i> بحث عن النتيجة
        </button>

        <div id="resultArea" class="glass-card" style="background: #fff; margin-top:25px; text-align: right;">
            <h3 id="resName" style="color:var(--primary); border-bottom: 2px solid var(--accent); padding-bottom:10px;"></h3>
            <div id="resGrades"></div>
        </div>
    </div>

    <div id="adminPanel" class="glass-card">
        <h2 style="color: var(--primary)"><i class="fas fa-user-shield"></i> إضافة درجات</h2>
        <input type="number" id="stdID" placeholder="الرقم الوطني" style="margin-bottom:10px">
        <input type="text" id="stdName" placeholder="اسم الطالب" style="margin-bottom:10px">
        <div id="gradesInputs">
            <div style="display:flex; gap:5px; margin-bottom:10px">
                <input type="text" placeholder="المادة" class="subject">
                <input type="number" placeholder="الدرجة" class="score">
            </div>
        </div>
        <button onclick="addSubjectField()" style="background:#64748b; margin-bottom:10px; font-size:14px">
            <i class="fas fa-plus"></i> إضافة مادة أخرى
        </button>
        <button onclick="saveToFirebase()" style="background: #10b981">
            <i class="fas fa-cloud-upload-alt"></i> حفظ في السحابة
        </button>
        <button onclick="closeAdmin()" style="background: #ef4444; margin-top:10px">إغلاق</button>
    </div>

    <div class="admin-link" onclick="openAdmin()">لوحة تحكم الإدارة</div>
</div>

<div id="toast" class="toast">تمت العملية بنجاح!</div>

<script>
    // --- إعدادات FIREBASE الخاصة بك ---
    const firebaseConfig = {
      apiKey: "AIzaSyC...", // تأكد من وجود مفاتيحك هنا من الكود السابق
      authDomain: "istiqlal-school.firebaseapp.com",
      databaseURL: "https://istiqlal-school-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school",
      storageBucket: "istiqlal-school.appspot.com",
      messagingSenderId: "...",
      appId: "..."
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // دالة البحث
    function searchStudent() {
        const id = document.getElementById('searchID').value;
        if(!id) return alert("يرجى إدخال الرقم الوطني");

        db.ref('students/' + id).once('value', (snapshot) => {
            const data = snapshot.val();
            const area = document.getElementById('resultArea');
            if(data) {
                document.getElementById('resName').innerText = "اسم الطالب: " + data.name;
                let html = "";
                data.grades.forEach(g => {
                    html += `<div class="result-item">
                                <span>${g.subject}</span>
                                <span class="grade-badge">${g.score}</span>
                             </div>`;
                });
                document.getElementById('resGrades').innerHTML = html;
                area.style.display = "block";
            } else {
                alert("عذراً، لم يتم العثور على نتيجة لهذا الرقم.");
                area.style.display = "none";
            }
        });
    }

    // إدارة المنظومة
    function openAdmin() {
        const pass = prompt("أدخل كلمة مرور الإدارة:");
        if(pass === "74742000") {
            document.getElementById('adminPanel').style.display = "block";
            document.getElementById('searchPanel').style.display = "none";
        } else {
            alert("كلمة مرور خاطئة!");
        }
    }

    function closeAdmin() {
        document.getElementById('adminPanel').style.display = "none";
        document.getElementById('searchPanel').style.display = "block";
    }

    function addSubjectField() {
        const div = document.createElement('div');
        div.style.display = "flex";
        div.style.gap = "5px";
        div.style.marginBottom = "10px";
        div.innerHTML = `<input type="text" placeholder="المادة" class="subject">
                         <input type="number" placeholder="الدرجة" class="score">`;
        document.getElementById('gradesInputs').appendChild(div);
    }

    function saveToFirebase() {
        const id = document.getElementById('stdID').value;
        const name = document.getElementById('stdName').value;
        const subjects = document.querySelectorAll('.subject');
        const scores = document.querySelectorAll('.score');
        
        let grades = [];
        subjects.forEach((s, index) => {
            if(s.value) grades.push({ subject: s.value, score: scores[index].value });
        });

        if(!id || !name || grades.length === 0) return alert("أكمل البيانات أولاً");

        db.ref('students/' + id).set({ name, grades }, (err) => {
            if(!err) {
                showToast("تم الحفظ بنجاح!");
                document.getElementById('stdID').value = "";
                document.getElementById('stdName').value = "";
                document.getElementById('gradesInputs').innerHTML = `<div style="display:flex; gap:5px; margin-bottom:10px">
                    <input type="text" placeholder="المادة" class="subject">
                    <input type="number" placeholder="الدرجة" class="score">
                </div>`;
            }
        });
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = "block";
        setTimeout(() => t.style.display = "none", 3000);
    }
</script>

</body>
</html>
