<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة مدرسة الاستقلال - الإدارة الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --main: #1e293b; --accent: #2563eb; --gold: #b45309; --success: #10b981; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: 0.3s; }
        body { margin: 0; padding: 10px; background: #f8fafc; min-height: 100vh; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 600px; }
        .card { background: white; border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; margin-bottom: 20px; }
        .logo-btn { width: 80px; height: 80px; background: #fff; border-radius: 20px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--accent); cursor: pointer; }
        .logo-btn i { font-size: 40px; color: var(--accent); }
        h1 { font-size: 24px; color: var(--main); margin: 0; font-weight: 900; }
        
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 15px; outline: none; font-weight: 700; margin-bottom: 10px; }
        .btn-search { width: 100%; padding: 15px; border: none; border-radius: 15px; background: var(--accent); color: white; font-weight: 800; cursor: pointer; }
        
        #resultArea { display: none; margin-top: 25px; text-align: right; }
        .res-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .res-table th { background: #f1f5f9; padding: 10px; font-size: 12px; }
        .res-table td { padding: 12px 5px; border-bottom: 1px solid #f1f5f9; text-align: center; font-weight: 700; }
        .total-box { background: #fef3c7; color: var(--gold); padding: 3px 8px; border-radius: 6px; }

        /* ستايل الإدارة الخاص بك */
        #adminPanel { display: none; text-align: right; }
        .grid-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .filter-tabs { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; margin: 15px 0; }
        .filter-btn { padding: 8px 12px; border-radius: 10px; border: 1px solid var(--accent); background: white; color: var(--accent); font-weight: 700; cursor: pointer; font-size: 12px; }
        .filter-btn.active { background: var(--accent); color: white; }
        .std-list-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        .std-list-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: right; }
        .btn-edit { background: var(--gold); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .admin-search-box { background: #fffbeb; border: 2px solid var(--gold); padding: 12px; border-radius: 15px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card" id="searchPanel">
        <div class="logo-btn" ondblclick="openAdmin()">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <h1>مدرسة الاستقلال</h1>
        <p style="font-size:13px; color:gray; margin-bottom:20px">استعلم عن نتيجتك بالرقم الوطني</p>
        <input type="number" id="searchID" placeholder="أدخل الرقم الوطني فقط...">
        <button class="btn-search" onclick="searchStudent()">عرض النتيجة</button>

        <div id="resultArea">
            <div id="resName" style="background:var(--main); color:white; padding:10px; border-radius:10px; margin-bottom:15px; font-weight:700"></div>
            <table class="res-table">
                <thead><tr><th style="text-align:right">المادة</th><th>أعمال</th><th>إمتحان</th><th>مجموع</th></tr></thead>
                <tbody id="resGrades"></tbody>
            </table>
        </div>
    </div>

    <div id="adminPanel" class="card">
        <h2 style="margin:0 0 20px 0; color:var(--main)">لوحة التحكم المركزية</h2>
        
        <input type="number" id="stdID" placeholder="الرقم الوطني">
        <input type="text" id="stdName" placeholder="اسم الطالب بالكامل">
        <select id="stdLevel">
            <option value="">-- اختر السنة الدراسية --</option>
            <option value="سادس">سادس</option><option value="سابع">سابع</option>
            <option value="ثامن">ثامن</option><option value="تاسع">تاسع</option>
        </select>
        <div id="gradesInputs">
            <div class="grid-3"><input type="text" placeholder="المادة" class="subject"><input type="number" placeholder="أعمال" class="work"><input type="number" placeholder="إمتحان" class="exam"></div>
        </div>
        <button onclick="addRow()" style="width:100%; padding:10px; margin-bottom:10px; background:#f1f5f9; border:none; border-radius:10px; font-weight:700">+ إضافة مادة</button>
        <button onclick="saveData()" style="width:100%; padding:15px; background:var(--success); color:white; border:none; border-radius:12px; font-weight:900;">حفظ الطالب</button>
        
        <div style="margin-top:30px; border-top:2px solid #eee; padding-top:20px">
            <h3 style="margin:0 0 10px 0">إدارة وتعديل الطلاب</h3>
            <div class="admin-search-box">
                <i class="fas fa-search" style="color:var(--gold)"></i>
                <input type="text" id="adminSearchInput" placeholder="ابحث هنا بالاسم لتعديل أي طالب..." oninput="filterAdminList(this.value)" style="border:none; background:none; margin-bottom:0; padding:5px">
            </div>

            <div class="filter-tabs">
                <button class="filter-btn active" onclick="filterByLevel('الكل', this)">الكل</button>
                <button class="filter-btn" onclick="filterByLevel('سادس', this)">سادس</button>
                <button class="filter-btn" onclick="filterByLevel('سابع', this)">سابع</button>
                <button class="filter-btn" onclick="filterByLevel('ثامن', this)">ثامن</button>
                <button class="filter-btn" onclick="filterByLevel('تاسع', this)">تاسع</button>
            </div>
            <table class="std-list-table"><tbody id="adminListBody"></tbody></table>
        </div>
        <button onclick="closeAdmin()" style="margin-top:20px; color:gray; background:none; border:none; text-decoration:underline; cursor:pointer">خروج</button>
    </div>
</div>

<script>
    // --- بيانات Firebase (ضع بياناتك هنا) ---
    const firebaseConfig = {
      apiKey: "AIzaSyC...", 
      databaseURL: "https://istiqlal-school-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school",
      appId: "..."
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let localData = {};

    // جلب البيانات للخلفية
    db.ref('students').on('value', (s) => { localData = s.val() || {}; });

    // بحث الطالب (بالرقم فقط)
    function searchStudent() {
        const id = document.getElementById('searchID').value;
        const data = localData[id];
        if(data) {
            document.getElementById('resName').innerText = "الطالب: " + data.name + " (" + (data.level || '') + ")";
            let rows = "";
            data.grades.forEach(g => {
                const total = parseInt(g.work || 0) + parseInt(g.exam || 0);
                rows += `<tr><td style="text-align:right">${g.subject}</td><td>${g.work}</td><td>${g.exam}</td><td><span class="total-box">${total}</span></td></tr>`;
            });
            document.getElementById('resGrades').innerHTML = rows;
            document.getElementById('resultArea').style.display = "block";
        } else { alert("الرقم الوطني غير مسجل"); }
    }

    function openAdmin() {
        if(prompt("كلمة سر الإدارة:") === "74742000") {
            document.getElementById('adminPanel').style.display = "block";
            document.getElementById('searchPanel').style.display = "none";
            renderAdminList('الكل');
        }
    }

    function filterByLevel(level, btn) {
        if(btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        renderAdminList(level);
    }

    function filterAdminList(name) {
        renderAdminList('الكل', name);
    }

    function renderAdminList(level, searchName = "") {
        let html = "";
        for(let id in localData) {
            const s = localData[id];
            const matchLevel = (level === 'الكل' || s.level === level);
            const matchName = (searchName === "" || s.name.includes(searchName));
            if(matchLevel && matchName) {
                html += `<tr><td>${s.name}</td><td style="color:gray; font-size:11px">${id}</td><td><button class="btn-edit" onclick="editExisting('${id}')">تعديل</button></td></tr>`;
            }
        }
        document.getElementById('adminListBody').innerHTML = html || "<tr><td>لا يوجد نتائج</td></tr>";
    }

    function editExisting(id) {
        const data = localData[id];
        document.getElementById('stdID').value = id;
        document.getElementById('stdName').value = data.name;
        document.getElementById('stdLevel').value = data.level || "";
        document.getElementById('gradesInputs').innerHTML = "";
        data.grades.forEach(g => {
            const div = document.createElement('div');
            div.className = "grid-3";
            div.innerHTML = `<input type="text" value="${g.subject}" class="subject"><input type="number" value="${g.work}" class="work"><input type="number" value="${g.exam}" class="exam">`;
            document.getElementById('gradesInputs').appendChild(div);
        });
        window.scrollTo(0,0);
    }

    function addRow() {
        const div = document.createElement('div');
        div.className = "grid-3";
        div.innerHTML = `<input type="text" placeholder="المادة" class="subject"><input type="number" placeholder="أعمال" class="work"><input type="number" placeholder="إمتحان" class="exam">`;
        document.getElementById('gradesInputs').appendChild(div);
    }

    function saveData() {
        const id = document.getElementById('stdID').value, name = document.getElementById('stdName').value, level = document.getElementById('stdLevel').value;
        const subs = document.querySelectorAll('.subject'), works = document.querySelectorAll('.work'), exams = document.querySelectorAll('.exam');
        let grades = [];
        subs.forEach((s, i) => { if(s.value) grades.push({ subject: s.value, work: works[i].value, exam: exams[i].value }); });
        if(!id || !name || !level) return alert("يرجى إكمال البيانات");
        db.ref('students/' + id).set({ name, level, grades }, () => { alert("تم الحفظ بنجاح ✅"); });
    }

    function closeAdmin() { location.reload(); }
</script>
</body>
</html>
